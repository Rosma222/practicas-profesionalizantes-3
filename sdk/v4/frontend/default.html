<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto SDK v4.2 - Sistema de Acceso</title>

    <style>

        body
        {
            font-family: monospace;
            max-width: 480px;
            margin: 40px auto;
            padding: 0 16px;
        }

        h2
        {
            margin-top: 28px;
            font-size: 1em;
            text-transform: uppercase;
            border-bottom: 1px solid #ccc;
            padding-bottom: 4px;
        }

        input
        {
            display: block;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 6px;
            padding: 6px;
        }

        button
        {
            margin: 4px 4px 4px 0;
            padding: 6px 14px;
            cursor: pointer;
        }

        #status
        {
            margin-top: 8px;
            font-size: 0.85em;
            color: #555;
        }

        #resultado
        {
            margin-top: 14px;
            padding: 8px;
            background: #f5f5f5;
            border-left: 3px solid #999;
            font-size: 0.9em;
            min-height: 24px;
            white-space: pre-wrap;
        }

    </style>
</head>

<body>


<!-- REGISTRO -->
    <h2>Registro de usuario</h2>

    <input
        id="reg-user"
        placeholder="Usuario"
    >

    <input
        id="reg-pass"
        placeholder="Contraseña"
        type="password"
    >

    <button onclick="registrar()">
        Crear usuario
    </button>


<!-- LOGIN -->
    <h2>Login</h2>

    <input
        id="log-user"
        placeholder="Usuario"
    >

    <input
        id="log-pass"
        placeholder="Contraseña"
        type="password"
    >

    <button onclick="hacerLogin()">
        Iniciar Sesión
    </button>

    <button onclick="hacerLogout()">
        Cerrar Sesión
    </button>

    <div id="status">
        No estás logueado.
    </div>


<!-- ACCIONES PROTEGIDAS -->
   
    <h2>Ejecutar Acciones</h2>

    <button onclick="llamar('/Print')">
        /Print
    </button>

    <button onclick="llamar('/Log')">
        /Log
    </button>

    <button onclick="llamar('/Help')">
        /Help
    </button>

    <button onclick="llamar('/SayHello')">
        /SayHello
    </button>

    <button onclick="llamar('/SayBye')">
        /SayBye
    </button>

  
<!-- RESULTADO -->
   
    <h2>Resultado de la Operación</h2>

    <div id="resultado">
        Esperando acción del usuario...
    </div>

<script>


// SESIÓN DEL CLIENTE: Guarda el username actualmente logueado.
   
    let usuarioActual = null; // inicia sin sesion activa, por eso es null
    let bearerToken = null; // Token recibido al hacer login

    // FUNCIÓN AUX P/ MOSTRAR MENSAJES
    function mostrar(texto, esError)
    {
        const contenedor =  document.getElementById('resultado');
        contenedor.textContent = texto;

        if (esError){
            contenedor.style.borderLeftColor = 'red';
        }
        else{
            contenedor.style.borderLeftColor = 'green';
        }
    }


// FUNCIÓN DE ACCESO A LA WebAPI
// Encapsula: método POST, cabeceras estándar y token Bearer 
// Retorna { ok, data } ok es el estado HTTP y data es el JSON parseado.

    async function RPCWebAPIFetch(endpoint, body)
    {
        const headers = { 'Content-Type': 'application/json' };

        if (bearerToken){
            headers['Authorization'] = 'Bearer ' + bearerToken;
        }

        const response = await fetch('http://localhost:3000' + endpoint, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(body)
        });

        const data = await response.json();

        return { ok: response.ok, data: data };
    }




// REGISTRO

    async function registrar()
    {
        const username =  document.getElementById('reg-user').value;
        const password = document.getElementById('reg-pass').value;

        try{
            const response = await fetch('http://localhost:3000/Register',
            {
                method: 'POST',
                headers:{ 'Content-Type': 'application/json'},
                body: JSON.stringify ({username: username, password: password})
            });

            const data = await response.json();

            if (response.ok){
                mostrar(data.message, false);
            }
            else{
                mostrar ('Error: ' + data.error, true);
            }
        }
        catch(error) {
            mostrar ('Error conectando con el servidor.',true );
        }
    }



// REGISTRO

    async function registrar()
    {
        const username = document.getElementById('reg-user').value;
        const password = document.getElementById('reg-pass').value;

        try{
            const { ok, data } = await RPCWebAPIFetch('/Register', { username, password });

            if (ok){
                mostrar(data.message, false);
            }
            else{
                mostrar('Error: ' + (data.detail ? data.detail.join('\n') : JSON.stringify(data)), true);
            }
        }
        catch(error){
            mostrar('Error conectando con el servidor.', true);
        }
    }


// LOGIN

    async function hacerLogin()
    {
        const username = document.getElementById('log-user').value;
        const password = document.getElementById('log-pass').value;

        try{
            const { ok, data } = await RPCWebAPIFetch('/Login', { username, password });

            if (ok){
                usuarioActual = username;
                bearerToken   = data.token || null;

                document.getElementById('status').textContent = 'Logueado como: ' + username;
                mostrar('Sesión habilitada correctamente.', false);
            }
            else{
                mostrar('Falla de autenticación: ' + (data.detail ? data.detail.join('\n') : JSON.stringify(data)), true);
            }
        }
        catch(error){
            mostrar('Error conectando con el servidor.', true);
        }
    }


// LOGOUT

    async function hacerLogout()
    {
        if (!usuarioActual){
            mostrar('No hay sesión activa.', true);
            return;
        }

        try{
            const { ok, data } = await RPCWebAPIFetch('/Logout', { username: usuarioActual });

            if (ok){
                usuarioActual = null;
                bearerToken   = null;

                document.getElementById('status').textContent = 'No estás logueado.';
                mostrar('Sesión deshabilitada.', false);
            }
            else{
                mostrar(data.detail ? data.detail.join('\n') : JSON.stringify(data), true);
            }
        }
        catch(error){
            mostrar('Error conectando con el servidor.', true);
        }
    }


    
// LLAMADAS A ENDPOINTS PROTEGIDOS

    async function llamar(endpoint)
    {
        if (!usuarioActual){
            mostrar('Aviso: Primero tenés que loguearte.', true);
            return;
        }

        if (!bearerToken){
            mostrar('No hay token almacenado. Inicia sesión otra vez.', true);
            return;
        }

        try{
            const { ok, data } = await RPCWebAPIFetch(endpoint, { username: usuarioActual });

            if (ok){
                mostrar(data.message, false);
            }
            else{
                mostrar('Cartel de Aviso del Servidor:\n' + (data.detail ? data.detail.join('\n') : JSON.stringify(data)), true);
            }
        }
        catch(error){
            mostrar('Error conectando con el servidor.', true);
        }
    }


</script>

</body>
</html>
